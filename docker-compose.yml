version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: vitalcore_redis
    ports:
      - "6379:6379"   # Redis
      - "8001:8001"   # RedisInsight (UI visual)
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    restart: unless-stopped

volumes:
  redis_data:
